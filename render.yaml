services:
  - type: web
    name: madan-paints
    env: node
    buildCommand: npm run build:client
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: /api
      - key: ALLOWED_ORIGINS
        value: https://madan-paints.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "200"
