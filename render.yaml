services:
  - type: web
    name: madanpaints
    env: node
    plan: free
    buildCommand: npm install && cd client && npm install && cd .. && npm run build:client
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: /api
      - key: ALLOWED_ORIGINS
        value: https://madanpaints.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "200"
